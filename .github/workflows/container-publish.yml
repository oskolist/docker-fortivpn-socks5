name: Build and Publish Docker Image
on:
  #push:
  #  branches:
  #    - master
  schedule:
    # Runs every day at 00:00 UTC. Adjust cron syntax as needed.
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Set Variables
        id: variables
        run: |
          echo "[INFO] Converting everything to lowercase because ghcr repository name must be lowercase..."
          ACTOR="$(echo "${{ github.actor }}" | tr '[:upper:]' '[:lower:]')"
          echo "actor=$ACTOR" >>$GITHUB_OUTPUT
          REPOSITORY="$(echo "${{ github.repository }}" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]')"
          echo "repository=$REPOSITORY" >>$GITHUB_OUTPUT
          echo "[INFO] Getting Latest OpenFortiVPN version..."
          OPENFORTIVPN_LATEST="$(curl  "https://api.github.com/repos/adrienverge/openfortivpn/tags" | jq -r '.[0].name')"
          echo "latest_openfortivpn=$OPENFORTIVPN_LATEST" >>$GITHUB_OUTPUT
          echo "[INFO] Found latest OpenFortiVPN version: $OPENFORTIVPN_LATEST"
          echo "[INFO] Checking if Image Tag Exists in GHCR..."
          TAG="ghcr.io/$ACTOR/$REPOSITORY:$OPENFORTIVPN_LATEST"
          # Use HEAD request to check manifest existence
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "$TAG")
          if [ "$STATUS" -eq 200 ]; then
            echo "imageexists=true" >> $GITHUB_OUTPUT
            echo "[INFO] Image tag $TAG already exists. Skipping build."
          else
            echo "imageexists=false" >> $GITHUB_OUTPUT
            echo "[INFO] Image tag $TAG not found. Proceeding with build."
          fi
      - name: Exit if Version Exists
        if: steps.variables.outputs.imageexists == 'true'
        run: exit 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            OPENFORTIVPN_VERSION=${{ steps.variables.outputs.latest_openfortivpn }}
          tags: |
            ghcr.io/${{ steps.variables.outputs.actor }}/${{ steps.variables.outputs.repository }}:${{ steps.variables.outputs.latest_openfortivpn }}
            ghcr.io/${{ steps.variables.outputs.actor }}/${{ steps.variables.outputs.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
